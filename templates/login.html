{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card card-premium p-4 mt-5">
        <div class="text-center mb-4">
            <div class="d-inline-block bg-primary text-white rounded-circle p-3 mb-2">
                <i class="bi bi-shield-lock-fill fs-2"></i>
            </div>
            <h4 class="fw-bold text-dark">Acceso al Sistema</h4>
            <p class="text-muted small">Ingrese sus credenciales corporativas</p>
        </div>

        <form action="{{ url_for('routes.login') }}" method="POST">
            <div class="mb-3">
                <label for="correo" class="form-label font-weight-bold">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="correo" name="correo" placeholder="usuario@demo.com" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label font-weight-bold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-custom-primary w-100 py-2 mb-3">
                <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar Sesión
            </button>
        </form>

        <hr class="text-muted my-3">

        <div class="text-center">
            <p class="mb-0 small text-muted">¿No tiene cuenta? <a href="{{ url_for('routes.registro') }}" class="text-decoration-none fw-bold">Regístrese aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}
